<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan's Golden Bookstore</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 0;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 40px;
        }

        h1 {
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .book-card {
            background: #262626;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
            transition: 0.3s;
        }

        .book-card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
        }

        .book-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 5px;
        }

        .price {
            display: block;
            margin: 10px 0;
            font-size: 1.2rem;
        }

        .buy-btn {
            display: inline-block;
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }

        /* Contact Section Styles */
        .contact-section {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #262626;
            border: 1px solid #d4af37;
            border-radius: 15px;
            text-align: center;
        }

        .contact-section h2 {
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .contact-section input, 
        .contact-section textarea {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #ffffff;
            border-radius: 5px;
            font-family: inherit;
        }

        .contact-section input:focus, 
        .contact-section textarea:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .send-btn {
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 15px;
        }

        .send-btn:hover {
            background-color: #f1c40f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Hassan's Golden Bookstore</h1>
        <p>Excellence in every page</p>
    </header>

    <div class="container">
        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1543003968-a393be56a5ed?q=80&w=400" alt="Book">
            <h3>Luxury of Reading</h3>
            <span class="price">$49.99</span>
            <a href="#" class="buy-btn">Add to Cart</a>
        </div>

        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=400" alt="Book">
            <h3>Golden Wisdom</h3>
            <span class="price">$35.00</span>
            <a href="#" class="buy-btn">Add to Cart</a>
        </div>

        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?q=80&w=400" alt="Book">
            <h3>The Royal Library</h3>
            <span class="price">$55.00</span>
            <a href="#" class="buy-btn">Add to Cart</a>
        </div>
    </div>

    <section class="contact-section">
        <h2>Get In Touch</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea rows="4" placeholder="How can we help you?"></textarea>
            <button type="submit" class="send-btn">Send Message</button>
        </form>
    </section>

</body>
</html>
