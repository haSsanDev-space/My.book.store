<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan's Golden Bookstore</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 60px 0;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 40px;
        }

        h1 {
            color: #d4af37;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        header p {
            color: #bdc3c7;
            font-style: italic;
            margin-top: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }

        .book-card {
            background: #262626;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-10px);
            border-color: #d4af37;
        }

        .book-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .book-card h3 {
            color: #d4af37;
            margin: 10px 0;
        }

        .price {
            display: block;
            font-size: 1.2rem;
            color: #ecf0f1;
            margin-bottom: 20px;
        }

        .buy-btn {
            display: inline-block;
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s ease;
        }

        .buy-btn:hover {
            background-color: #f1c40f;
        }

        .contact-section {
            max-width: 700px;
            margin: 80px auto;
            padding: 40px;
            background: #262626;
            border: 1px solid #d4af37;
            border-radius: 15px;
            text-align: center;
        }

        .contact-section h2 {
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .contact-section input, 
        .contact-section textarea {
            width: 95%;
            padding: 15px;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #ffffff;
            border-radius: 6px;
            font-size: 1rem;
        }

        .contact-section input:focus, 
        .contact-section textarea:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        .send-btn {
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 15px 50px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .send-btn:hover {
            background-color: #f1c40f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Hassan's Golden Bookstore</h1>
        <p>Excellence in every page</p>
    </header>

    <div class="container">
        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1543003968-a393be56a5ed?q=80&w=400" alt="Book">
            <h3>Luxury of Reading</h3>
            <span class="price">$49.99</span>
            <a href="#" class="buy-btn">Add to Cart</a>
        </div>

        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=400" alt="Book">
            <h3>Golden Wisdom</h3>
            <span class="price">$35.00</span>
            <a href="#" class="buy-btn">Add to Cart</a>
        </div>

        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?q=80&w=400" alt="Book">
            <h3>The Royal Library</h3>
            <span class="price">$55.00</span>
            <a href="#" class="buy-btn">Add to Cart</a>
        </div>
    </div>

    <section class="contact-section">
        <h2>Get In Touch</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit" class="send-btn">Send Message</button>
        </form>
    </section>

</body>
</html>
