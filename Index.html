<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Book Store</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8f9fa; 
            text-align: center; 
            padding: 50px; 
            color: #333;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: inline-block; 
            max-width: 400px;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 18px; }
        .btn { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn:hover { background-color: #2980b9; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Book Store 📚</h1>
        <p>This is my first project hosted on GitHub.</p>
        <p>Learning Web Development is exciting!</p>
        
        <button class="btn" onclick="sayHello()">Click Me!</button>
    </div>

    <script>
        function sayHello() {
            alert('Hello World! My website is live 🚀');
        }
    </script>

</body>
</html>
